# ------------------------------------------------------
# Main Hyprland Configuration Entry Point.
# This file sources all modular configuration components.

# ── Load Global Variables ─────────────────────────────
# This is handled by sourcing the generated env.conf 
# which is derived from config.env

# ── Sourcing Modules ─────────────────────────────────
source = ~/.config/hypr/env.conf        # Environment variables
source = ~/.config/hypr/monitors.conf   # Monitor setup
source = ~/.config/hypr/animations.conf # Visuals: Animations
source = ~/.config/hypr/windowrules.conf # Behavior: Window rules
source = ~/.config/hypr/keybinds.conf    # Interaction: Keybindings
source = ~/.config/hypr/userprefs.conf   # User-specific additions

# ── General Settings ─────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

dwindle {
    pseudotile = yes # master switch for pseudotiling
    preserve_split = yes # you probably want this
}

master {
    new_is_master = true
}

gestures {
    workspace_swipe = off
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
}
